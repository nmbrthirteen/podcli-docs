name: Notify landing

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the landing site to pull the latest docs
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.LANDING_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/nmbrthirteen/podcli-landing/dispatches \
            -d '{"event_type":"docs-updated"}'
